<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHer - Admin Login</title>

     <link rel="stylesheet"  href="{{ url_for('static', filename='admin_login.css') }}">
</head>

<body>

<div class="page">

    <h1 class="logo">SafeHer</h1>

    <p class="quote">
        Empowering women through rapid emergency assistance and secure incident reporting.
    </p>

    <div class="login-card">

        <h2>Admin Login</h2>

        

       <form method="POST">

    <input type="email"
           name="email"
           placeholder="Admin Email"
           required>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <button type="submit"
            class="login-btn">

        Login

    </button>

</form>

    </div>

</div>

</body>
</html>
