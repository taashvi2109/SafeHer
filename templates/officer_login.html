<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeHer - Officer Login</title>

     <link rel="stylesheet"  href="{{ url_for('static', filename='officer_login.css') }}">
</head>

<body>

<div class="page">

    <h1 class="logo">SafeHer</h1>

    <p class="quote">
        Empowering women through rapid emergency assistance and secure incident reporting.
    </p>

    <div class="login-card">
          <form method="post">
        <h2>Officer Login</h2>

        <input type="text"
                name="email"
                placeholder="Officer Email-ID"
                required>

            <input type="password"
                    name="password"
                    placeholder="Password"
                    required>

         <button type="submit" class="login-btn">
    Login
</button>
          </form>
    </div>

</div>

</body>
</html>
